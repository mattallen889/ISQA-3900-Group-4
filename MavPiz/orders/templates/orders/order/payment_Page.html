{% extends 'shop/base.html' %}

{% block content %}
<div class="payment-page">
  <div class="payment-container">
    <h2 class="payment-title">Complete Your Payment</h2>

    <form id="payment-form">

      <div class="form-group">
        <label for="name">Cardholder Name</label>
        <input type="text" id="name" placeholder="" required>
      </div>

      <div class="form-group">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" placeholder="" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="expiry">Expiry Date</label>
          <input type="text" id="expiry" placeholder="" required>
        </div>

        <div class="form-group">
          <label for="cvv">CVV</label>
          <input type="text" id="cvv" placeholder="" required>
        </div>
      </div>

      <div class="form-group">
        <label for="billing-zip">Billing ZIP Code</label>
        <input type="text" id="billing-zip" placeholder="" required>
      </div>

      <div class="order-total">
        Total: $49.99
      </div>

      <button type="submit" class="pay-btn">Pay Now</button>

      <div class="success-message" id="success-message"></div>

    </form>
  </div>
</div>
{% endblock %}
