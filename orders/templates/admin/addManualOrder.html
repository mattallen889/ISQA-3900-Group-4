{% extends "shop/base.html" %}

{% block content %}
    <h1>Add Manual Order</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Order</button>
        <a href="{% url 'orders:manage_customer_orders' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
