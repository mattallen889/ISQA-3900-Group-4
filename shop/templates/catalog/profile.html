{% extends "shop/base.html" %}

{% block content %}
    <style>
        .btn-mav-blue {
            background-color: #6296b9;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
            border: none;
            font-weight: bold;
            transition: background-color 0.2s ease-in-out;
            margin-top: 15px;
        }

        .btn-mav-blue:hover {
            background-color: #4a779a;
            color: white;
            text-decoration: none;
        }
    </style>

    <h1>Profile</h1>
    <br>
    <br>
    <h3><u>Profile Information</u></h3>

    <p>Username: {{ user.username }}</p>
    <p>First Name: {{ user.first_name }}</p>
    <p>Last Name: {{ user.last_name }}</p>
    <p>Email Address: {{ user.email }}</p>
    <br>
    <br>
    {% if user.is_authenticated %}
    <div class="profile-actions">
        <a href="{% url 'orders:user_orders' %}" class="btn btn-mav-blue">View My Orders</a>
    </div>
    {% endif %}
{% endblock %}
